name: CI / Release

on:
  push:
    branches: [master]
    tags: ["v*"]
  pull_request:
    branches: [master]

jobs:
  test:
    name: Test
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - run: go test ./internal/...

      # Frontend tests slot in here — uncomment when added:
      # - uses: actions/setup-node@v4
      #   with:
      #     node-version: "22"
      #     cache: npm
      #     cache-dependency-path: frontend/package-lock.json
      # - run: npm ci
      #   working-directory: frontend
      # - run: npm test
      #   working-directory: frontend

  release:
    name: Build & Release
    runs-on: ubuntu-24.04
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libsoup-3.0-dev \
            pkg-config \
            build-essential \
            libglib2.0-dev

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0

      - name: Build
        run: wails build -tags webkit2_41 -ldflags "-s -w"

      - name: Extract version
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Package tarball
        run: tar -czf "build/bin/nineveh-${{ steps.version.outputs.VERSION }}-linux-amd64.tar.gz" -C build/bin nineveh

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release delete "${{ github.ref_name }}" --yes 2>/dev/null || true
          gh release create "${{ github.ref_name }}" \
            --title "nineveh ${{ github.ref_name }}" \
            --generate-notes \
            "build/bin/nineveh-${{ steps.version.outputs.VERSION }}-linux-amd64.tar.gz"

      - name: Compute SHA256
        id: sha
        run: |
          echo "SHA256=$(sha256sum "build/bin/nineveh-${{ steps.version.outputs.VERSION }}-linux-amd64.tar.gz" | awk '{print $1}')" >> "$GITHUB_OUTPUT"

      - name: Update AUR
        env:
          AUR_SSH_KEY: ${{ secrets.AUR_SSH_KEY }}
          VERSION: ${{ steps.version.outputs.VERSION }}
          SHA256: ${{ steps.sha.outputs.SHA256 }}
        run: bash scripts/update-aur.sh
